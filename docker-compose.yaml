version: "3.8"

services:
  db:
    image: postgres:latest
    container_name: nym_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nym_dev
    ports:
      - "5432:5432"
    volumes:
      - "postgres_data:/var/lib/postgresql"
    networks:
      - intranet

networks:
  intranet:
    driver: bridge

volumes:
  postgres_data:
